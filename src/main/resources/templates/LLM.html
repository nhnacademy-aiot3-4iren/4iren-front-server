                    <path d="M12 2l1.5 5.5L19 9l-5.5 1.5L12 16l-1.5-5.5L5 9l5.5-1.5L12 2z"></path>
                    <path d="M19 16l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"></path>
                </svg>
                <h2 class="chat-title">궁금한 점을 물어보세요</h2>
            </div>

            <!-- id 부여: 메시지와 추천 질문이 모두 여기 쌓입니다 -->
            <div class="chat-content" id="chatContent">
                <div class="suggestions-title">Suggestions on what to ask Our AI</div>
                <div class="suggestion-bubble" data-question="오늘 날씨 어떄?">
                    오늘 날씨 어떄?
                </div>
                <div class="suggestion-bubble" data-question="공기질은 괜찮아?">
                    공기질은 괜찮아?
                </div>
                <div class="suggestion-bubble" data-question="오늘 우산 챙겨야 할까?">
                    오늘 우산 챙겨야 할까?
                </div>
            </div>

            <div class="chat-input-wrapper">
                <div class="chat-input-container">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Ask me anything about your projects">
                    <button id="sendBtn" class="send-btn" type="button">
                        <svg class="send-icon" viewBox="0 0 24 24">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

        </main>

    </div>
</div>

<script>
    let chatInput, sendBtn, chatContent;

    document.addEventListener('DOMContentLoaded', () => {
        chatInput = document.getElementById('chatInput');
        sendBtn = document.getElementById('sendBtn');
        chatContent = document.getElementById('chatContent');

        console.log("1. 화면 로드 완료! 요소 확인:", {
            chatInput: chatInput,
            sendBtn: sendBtn
        });

        if (sendBtn) {
            sendBtn.addEventListener('click', (e) => {
                e.preventDefault(); // 기본 동작(새로고침 등) 강제 차단
                console.log("2. [전송 버튼 클릭됨] 현재 입력창 값:", chatInput.value);
                sendMessage();
            });
        }

        if (chatInput) {
            chatInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    console.log("2. [엔터키 입력됨] 현재 입력창 값:", chatInput.value);
                    sendMessage();
                }
            });
        }

        document.querySelectorAll('.suggestion-bubble').forEach(bubble => {
            bubble.addEventListener('click', () => {
                console.log("2. [추천 질문 클릭됨] 데이터:", bubble.dataset.question);
                sendMessage(bubble.dataset.question);
            });
        });
    });

    function appendMessage(text, sender) {
        if (!chatContent) return;
        const messageRow = document.createElement('div');
        messageRow.className = `message-row ${sender}`;
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble ${sender}-bubble`;
        //줄바꿈
        bubble.innerText = text.replace(/\\n/g, '\n');
        messageRow.appendChild(bubble);
        chatContent.appendChild(messageRow);
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    async function sendMessage(text) {
        console.log("3. sendMessage 함수 시작, 전달받은 인자(text):", text);

        let messageToHappen = "";

        // text가 문자열로 제대로 들어왔으면 그것을 사용, 아니면 input 값을 사용
        if (typeof text === 'string' && text.trim() !== '') {
            messageToHappen = text.trim();
        } else if (chatInput) {
            messageToHappen = chatInput.value.trim();
        }

        console.log("4. 최종 전송할 텍스트(messageToHappen):", messageToHappen);

        if (!messageToHappen) {
            console.warn("🚨 [경고] 최종 메시지가 비어있어 서버로 요청을 보내지 않습니다.");
            return; // 여기서 멈춘다면 input 창의 값을 아예 못 읽고 있는 것입니다.
        }

        // 화면 표시 및 초기화
        appendMessage(messageToHappen, 'user');
        if(chatInput) chatInput.value = '';

        // (이하 서버 전송 로직 생략 없이 그대로 유지)
        if(chatInput) chatInput.disabled = true;
        if(sendBtn) sendBtn.disabled = true;

        try {
            console.log("5. 서버로 fetch 요청 보냄:", `/llm?message=${encodeURIComponent(messageToHappen)}`);
            const url = `/llm?message=${encodeURIComponent(messageToHappen)}`;
            const response = await fetch(url, { method: 'GET' });

            if (!response.ok) throw new Error('Network response was not ok');

            const reply = await response.text();
            appendMessage(reply, 'bot');

        } catch (error) {
            console.error('Error:', error);
            appendMessage('서버와 연결할 수 없습니다.', 'bot');
        } finally {
            if(chatInput) chatInput.disabled = false;
            if(sendBtn) sendBtn.disabled = false;
            if(chatInput) chatInput.focus();
        }
    }
</script>
